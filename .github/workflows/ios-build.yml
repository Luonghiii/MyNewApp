name: Build iOS IPA
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install EAS CLI
        run: npm install -g eas-cli
        
      - name: Install Dependencies
        run: npm install
        
      - name: Build IPA Local (Bypass Cache)
        run: |
          # Dùng lệnh này để nó tự động tạo file app thô
          npx expo export --platform ios
          mkdir -p Payload
          # Chỗ này tui dùng lệnh lùng sục file .app cho chắc
          find . -name "*.app" -exec cp -r {} Payload/ \;
          zip -r MyNewApp.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: MyNewApp.ipa
